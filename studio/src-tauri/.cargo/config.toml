# Workaround for Ubuntu snap glibc conflict.
# Snap's older libpthread leaks via LD_LIBRARY_PATH and causes:
#   "undefined symbol: __libc_pthread_init, version GLIBC_PRIVATE"
# Unsetting LD_LIBRARY_PATH lets the linker find the correct system libs.
[target.'cfg(target_os = "linux")']
runner = ["env", "-u", "LD_LIBRARY_PATH"]
